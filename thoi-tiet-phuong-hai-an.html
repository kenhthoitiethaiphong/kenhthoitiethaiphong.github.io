<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thời tiết Phường Hải An</title>

<style>
:root {
    --primary-blue: #007bff;
    --light-bg: #f4f7f9;
    --card-bg: #ffffff;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--light-bg);
    padding: 15px;
    margin: 0;
}

.container { max-width: 900px; margin: auto; }

.current-weather {
    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: white;
    padding: 20px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.temp { font-size: 2.5em; font-weight: bold; }

.card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
}

.forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
}

.forecast-item {
    text-align: center;
    padding: 10px;
    background: #f9fbfc;
    border-radius: 10px;
}

.weather-icon {
    width: 40px;
}

.status-msg {
    text-align: center;
    margin-bottom: 10px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">

<header style="text-align:center;margin-bottom:20px;">
    <h1>Thời Tiết Phường Hải An</h1>
</header>

<div id="status" class="status-msg">Đang xác định vị trí...</div>

<div class="current-weather">
    <div>
        <div id="city-name">Đang tải...</div>
        <div id="weather-desc">--</div>
    </div>
    <div style="text-align:right;">
        <div id="temp" class="temp">--°C</div>
        <div id="humidity">--</div>
    </div>
</div>

<div class="card">
    <h2>24 giờ tới</h2>
    <div id="hourly-forecast" class="forecast-grid"></div>
</div>

<div class="card">
    <h2>5 ngày tới</h2>
    <div id="daily-forecast" class="forecast-grid"></div>
</div>

</div>

<script>
const API_KEY = 'cd3f77eb664f34468e29b27cfabe2425';
const DEFAULT_LAT = 20.8107;
const DEFAULT_LON = 106.7411;

function icon(i){
    return `https://openweathermap.org/img/wn/${i}@2x.png`;
}

async function getWeatherData(lat, lon, locationLabel){
    try {
        document.getElementById('status').innerText = "Đang tải dữ liệu...";

        // CURRENT
        const currentRes = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=vi`
        );
        if(!currentRes.ok) throw new Error("Lỗi current API");
        const currentData = await currentRes.json();

        document.getElementById('city-name').innerText = locationLabel;
        document.getElementById('temp').innerText = Math.round(currentData.main.temp) + "°C";
        document.getElementById('weather-desc').innerText = currentData.weather[0].description;
        document.getElementById('humidity').innerText = "Độ ẩm: " + currentData.main.humidity + "%";

        // FORECAST
        const forecastRes = await fetch(
            `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=vi`
        );
        if(!forecastRes.ok) throw new Error("Lỗi forecast API");
        const forecastData = await forecastRes.json();

        // 24h
        let hourlyDiv = document.getElementById('hourly-forecast');
        hourlyDiv.innerHTML = "";
        forecastData.list.slice(0,8).forEach(item=>{
            const time = new Date(item.dt*1000).getHours();

            hourlyDiv.innerHTML += `
            <div class="forecast-item">
                <div>${time}:00</div>
                <img class="weather-icon" src="${icon(item.weather[0].icon)}">
                <div><b>${Math.round(item.main.temp)}°C</b></div>
                <div style="font-size:0.8em">${item.weather[0].description}</div>
            </div>`;
        });

        // 5 ngày
        let dailyDiv = document.getElementById('daily-forecast');
        dailyDiv.innerHTML = "";
        forecastData.list
            .filter(i=>i.dt_txt.includes("12:00:00"))
            .slice(0,5)
            .forEach(item=>{
                const date = new Date(item.dt*1000)
                    .toLocaleDateString('vi-VN',{weekday:'short', day:'numeric'});

                dailyDiv.innerHTML += `
                <div class="forecast-item">
                    <div>${date}</div>
                    <img class="weather-icon" src="${icon(item.weather[0].icon)}">
                    <div><b>${Math.round(item.main.temp)}°C</b></div>
                    <div style="font-size:0.8em">${item.weather[0].description}</div>
                </div>`;
        });

        document.getElementById('status').innerText = "Cập nhật thành công";

    } catch(e){
        console.log(e);
        document.getElementById('status').innerText = "Lỗi tải dữ liệu";
        document.getElementById('city-name').innerText = "Không thể tải";
        document.getElementById('weather-desc').innerText = "Kiểm tra API hoặc mạng";
    }
}

// GPS
function initApp(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            pos=>{
                getWeatherData(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    "Vị trí của bạn"
                );
            },
            ()=>{
                getWeatherData(DEFAULT_LAT, DEFAULT_LON, "Phường Hải An");
            }
        );
    } else {
        getWeatherData(DEFAULT_LAT, DEFAULT_LON, "Phường Hải An");
    }
}

initApp();
</script>
<script>
function sendHeight(){
    const height = document.documentElement.scrollHeight;
    parent.postMessage({
        type: "weatherHeightHaiAn",
        height: height
    }, "*");
}

// gọi nhiều lần để tránh lỗi API load chậm
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);

setTimeout(sendHeight, 500);
setTimeout(sendHeight, 1500);
setTimeout(sendHeight, 3000);
</script>
</body>
</html>
