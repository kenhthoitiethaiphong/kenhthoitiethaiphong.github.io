<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thời Tiết Hải Phòng</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
    max-width:100vw;
    overflow-x:hidden;
    font-family:'Segoe UI',Tahoma;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* ===== CONTAINER ===== */
.weather-container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 15px 50px rgba(0,0,0,.2)
}

/* ===== HEADER ===== */
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:2em}
.update-time{font-size:.9em;color:#666}

/* ===== CURRENT ===== */
.current-weather{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
    padding:20px;
    border-radius:15px
}

.current-main{
    display:flex;
    align-items:center;
    gap:15px
}

.current-icon{font-size:80px}
.current-temp{font-size:3.5em;font-weight:bold}

.current-details{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px
}

.detail-item{
    background:rgba(255,255,255,.2);
    padding:10px;
    border-radius:10px;
    font-size:.9em
}

/* ===== SECTION ===== */
.section-title{
    margin:25px 0 10px;
    border-bottom:2px solid #667eea;
    padding-bottom:5px
}

/* ===== FORECAST ===== */
.hourly-forecast,
.daily-forecast{
    display:grid;
    gap:10px
}

.hourly-forecast{
    grid-template-columns:repeat(auto-fit,minmax(90px,1fr))
}

.daily-forecast{
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr))
}

.hourly-item,
.daily-item{
    background:#f5f7fa;
    padding:12px;
    border-radius:10px;
    text-align:center;
    word-break:break-word
}

.daily-item{border:1px solid #ddd}

/* ===== STATE ===== */
.loading,.error{
    text-align:center;
    padding:40px
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){
    .weather-container{padding:15px}

    .current-weather{
        grid-template-columns:1fr;
    }

    .current-temp{font-size:2.5em}
    .current-icon{font-size:60px}

    .hourly-forecast{
        grid-template-columns:repeat(auto-fit,minmax(80px,1fr))
    }

    .daily-forecast{
        grid-template-columns:repeat(auto-fit,minmax(100px,1fr))
    }
}

@media (max-width:480px){
    .header h1{font-size:1.4em}
    .current-temp{font-size:2em}

    .current-details{
        grid-template-columns:1fr;
    }

    .hourly-forecast{
        grid-template-columns:repeat(4,1fr)
    }

    .daily-forecast{
        grid-template-columns:repeat(2,1fr)
    }
}
</style>
</head>

<body>
<div class="weather-container">

    <div class="header">
        <h1>🌤️ Thời Tiết Hải Phòng</h1>
        <div id="updateTime">Đang tải...</div>
    </div>

    <div id="weatherContent" class="loading">⏳ Đang tải dữ liệu...</div>

</div>

<script>
const API_KEY="cd3f77eb664f34468e29b27cfabe2425";
const CITY="Haiphong";

/* ICON */
const icons={
'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️',
'03d':'☁️','04d':'☁️','09d':'🌧️','10d':'🌦️',
'11d':'⛈️','13d':'❄️','50d':'🌫️'
};
const icon=i=>icons[i]||'🌤️';

/* TIME */
function formatTime(ts,tz){
    const d=new Date((ts+tz)*1000);
    return d.getUTCHours()+":00";
}

function formatDate(ts,tz){
    const d=new Date((ts+tz)*1000);
    const day=d.getUTCDay();
    const days=["CN","T2","T3","T4","T5","T6","T7"];
    return days[day]+" "+d.getUTCDate()+"/"+(d.getUTCMonth()+1);
}

/* FETCH */
async function loadWeather(){
try{
    const [cur,fc]=await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY},VN&appid=${API_KEY}&units=metric&lang=vi`).then(r=>r.json()),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${CITY},VN&appid=${API_KEY}&units=metric&lang=vi`).then(r=>r.json())
    ]);

    if(cur.cod!=200) throw "API lỗi";

    const tz=cur.timezone||0;

    document.getElementById("updateTime").innerHTML=
        "Cập nhật: "+new Date().toLocaleString("vi-VN");

    render(cur,fc,tz);

}catch(e){
    document.getElementById("weatherContent").innerHTML=
    "<div class='error'>❌ Không tải được dữ liệu</div>";
}
}

/* RENDER */
function render(cur,fc,tz){

const html=`
<div class="current-weather">

    <div class="current-main">
        <div class="current-icon">${icon(cur.weather[0].icon)}</div>
        <div>
            <div class="current-temp">${Math.round(cur.main.temp)}°C</div>
            <div>${cur.weather[0].description}</div>
        </div>
    </div>

    <div class="current-details">
        <div class="detail-item">💧 ${cur.main.humidity}%</div>
        <div class="detail-item">🌡️ ${Math.round(cur.main.feels_like)}°C</div>
        <div class="detail-item">💨 ${Math.round(cur.wind.speed*3.6)} km/h</div>
        <div class="detail-item">☁️ ${cur.clouds.all}%</div>
    </div>

</div>

<h3 class="section-title">⏰ 24h tới</h3>
<div class="hourly-forecast">
${fc.list.slice(0,8).map(i=>`
    <div class="hourly-item">
        <div>${formatTime(i.dt,tz)}</div>
        <div>${icon(i.weather[0].icon)}</div>
        <div>${Math.round(i.main.temp)}°</div>
    </div>
`).join("")}
</div>

<h3 class="section-title">📅 5 ngày</h3>
<div class="daily-forecast">
${groupDay(fc.list,tz).map(d=>`
    <div class="daily-item">
        <div>${formatDate(d.dt,tz)}</div>
        <div>${icon(d.icon)}</div>
        <div>${Math.round(d.temp)}°</div>
    </div>
`).join("")}
</div>
`;

document.getElementById("weatherContent").innerHTML=html;
sendHeight();
}

/* GROUP DAY */
function groupDay(list,tz){
const map={};

list.forEach(i=>{
    const key=new Date((i.dt+tz)*1000).toDateString();
    if(!map[key]) map[key]={temps:[],dt:i.dt,icon:i.weather[0].icon};
    map[key].temps.push(i.main.temp);
});

return Object.values(map).slice(0,5).map(d=>({
    dt:d.dt,
    temp:d.temps.reduce((a,b)=>a+b)/d.temps.length,
    icon:d.icon
}));
}

/* INIT */
loadWeather();
setInterval(loadWeather,600000);
</script>

<script>
/* FIX IFRAME HEIGHT */
function sendHeight(){
    const h=document.body.scrollHeight;
    parent.postMessage({
        type:"weatherHeightHaiPhong",
        height:h
    },"*");
}

window.addEventListener("load",()=>setTimeout(sendHeight,500));
window.addEventListener("resize",sendHeight);
setInterval(sendHeight,2000);
</script>

</body>
</html>
